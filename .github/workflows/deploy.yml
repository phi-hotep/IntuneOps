# Purpose: CI/CD for the IntuneOps demo layer. On push it tests the pipeline, deploys the Azure
# Function (mock dry-run), then generates the web config from live values and deploys the page to
# Cloudflare Pages. Pull requests run tests only. Azure auth is OIDC (no stored password); the only
# Cloudflare inputs are the API token and account id, both GitHub secrets.
#
# Branch: this file, the OIDC federated-credential subject created by demo/deploy/Bootstrap-Demo.ps1,
# and the repository's actual default branch must all name the SAME branch. Change BRANCH in one place
# (the push trigger below) and pass the same value to Bootstrap-Demo.ps1 -Branch.

name: Deploy IntuneOps demo

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Single source of permissions for the whole workflow. Both deploy-function and deploy-web call
# azure/login with OIDC, so both need id-token: write; do not re-declare a narrower permissions block
# on either job.
permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-intuneops-demo
  AZURE_FUNCTIONAPP_NAME: intuneops-demo
  FUNCTION_NAME: RunComplianceScan
  CF_PAGES_PROJECT: intuneops-demo
  # The branch the Cloudflare Pages production deployment is published under. Keep in sync with the
  # push trigger above.
  DEPLOY_BRANCH: master

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester (mock and pure-logic tests; no Graph SDK needed)
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Throw = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

      - name: Lint (PSScriptAnalyzer, fail on Errors only)
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          # Documented exception: the AppSecret auth path (Resolve-IntuneOpsAuth) must turn a client
          # secret read from an environment variable into a PSCredential, which requires
          # ConvertTo-SecureString -AsPlainText. That use is intentional and guarded, so the rule is
          # excluded here rather than suppressed silently.
          $exclude = @('PSAvoidUsingConvertToSecureStringWithPlainText')
          $findings = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error -ExcludeRule $exclude
          if ($findings) {
            $findings | Format-Table -AutoSize | Out-String | Write-Host
            throw "PSScriptAnalyzer reported $($findings.Count) error-level finding(s)."
          }
          Write-Host "No error-level findings (excluded rules: $($exclude -join ', '))."

  deploy-function:
    name: Deploy Azure Function
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Stage the self-contained Function payload
        shell: pwsh
        run: pwsh demo/function/Stage-FunctionPayload.ps1

      - name: Deploy to the Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: demo/function

      - name: Sync triggers and warm up (force function indexing)
        shell: pwsh
        run: |
          # On a Consumption plan a zip deploy does not reliably index the function right away, so
          # both the endpoint and its keys can be missing for a while. Force the platform to re-read
          # the function metadata (sync triggers), then ping the app so the host cold-starts and
          # indexes the functions. This is what makes /api/scan (and the deploy-web key read) live.
          $sub = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          $rg  = $env:AZURE_RESOURCE_GROUP
          $app = $env:AZURE_FUNCTIONAPP_NAME
          $syncUri = "https://management.azure.com/subscriptions/$sub/resourceGroups/$rg/providers/Microsoft.Web/sites/$app/syncfunctiontriggers?api-version=2016-08-01"
          try {
            az rest --method post --url $syncUri --only-show-errors | Out-Null
            Write-Host "Requested trigger sync."
          } catch {
            Write-Host "Trigger sync request failed (non-fatal): $($_.Exception.Message)"
          }
          $base = "https://$app.azurewebsites.net"
          for ($i = 1; $i -le 12; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri $base -Method GET -TimeoutSec 30 -SkipHttpErrorCheck
              Write-Host "Warm-up ping ${i}: HTTP $($resp.StatusCode)"
              # Any response below 500 means the host is up and responding; it will index functions.
              if ([int]$resp.StatusCode -lt 500) { break }
            } catch {
              Write-Host "Warm-up ping $i failed: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 5
          }

  deploy-web:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    needs: deploy-function
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate config.js from the live function key
        shell: pwsh
        run: |
          # Read the HOST-level default function key (az functionapp keys list), not a per-function
          # key. The host key works for any function with authLevel 'function' (the ?code= param
          # accepts it) and, crucially, is retrievable from the app key store even before the
          # individual function is indexed in ARM -- which is exactly the state that broke the
          # per-function read on a fresh Consumption deploy. Retry briefly as a safety net.
          $key = $null
          $maxAttempts = 10
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            $key = az functionapp keys list `
              -g $env:AZURE_RESOURCE_GROUP -n $env:AZURE_FUNCTIONAPP_NAME `
              --query "functionKeys.default" -o tsv 2>$null
            if (-not [string]::IsNullOrWhiteSpace($key)) { break }
            Write-Host "Host key not ready yet (attempt $attempt/$maxAttempts); waiting 6s..."
            Start-Sleep -Seconds 6
          }
          if ([string]::IsNullOrWhiteSpace($key)) {
            throw "Could not read the host function key for $($env:AZURE_FUNCTIONAPP_NAME) after $maxAttempts attempts."
          }
          Write-Host "::add-mask::$key"
          $url = "https://$($env:AZURE_FUNCTIONAPP_NAME).azurewebsites.net/api/scan"
          "window.INTUNEOPS_DEMO_CONFIG = { functionUrl: '$url', functionKey: '$key' };" |
            Set-Content -LiteralPath demo/web/config.js -Encoding utf8
          Write-Host "Wrote demo/web/config.js targeting $url"

      - name: Ensure the Cloudflare Pages project exists
        # wrangler pages deploy does NOT create the project in CI; it errors with "Project not found"
        # on the first run. Create it here idempotently (skip if it already exists) so the very first
        # pipeline run works end to end without a manual dashboard step.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if npx --yes wrangler@3 pages project list 2>/dev/null | grep -qw "${CF_PAGES_PROJECT}"; then
            echo "Pages project '${CF_PAGES_PROJECT}' already exists."
          else
            echo "Creating Pages project '${CF_PAGES_PROJECT}' (production branch: ${DEPLOY_BRANCH})..."
            npx --yes wrangler@3 pages project create "${CF_PAGES_PROJECT}" --production-branch="${DEPLOY_BRANCH}"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy demo/web --project-name=${{ env.CF_PAGES_PROJECT }} --branch=${{ env.DEPLOY_BRANCH }} --commit-dirty=true
